services:
  backend:
    build:
      context: ./backend
    container_name: flyeasy-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
    networks:
      - flyeasy-network

  frontend:
    build:
      context: ./frontend
    container_name: flyeasy-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - flyeasy-network

networks:
  flyeasy-network:
    driver: bridge